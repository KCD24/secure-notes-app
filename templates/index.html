<!DOCTYPE html>
<html>
<head>
<title>Secure Notes</title>

<meta name="viewport"
content="width=device-width, initial-scale=1">

<style>

body {
    font-family: Arial;
    background: linear-gradient(
        135deg,
        #0f172a,
        #020617
    );
    color: white;
    margin: 0;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

.card {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
}

input {
    padding: 10px;
    width: 70%;
}

button {
    padding: 10px;
    background: #38bdf8;
    border: none;
    cursor: pointer;
}

.note {
    background: #1f2937;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
}

.top {
    display: flex;
    justify-content: space-between;
}

.light {
    background: white;
    color: black;
}

.light .card {
    background: #f3f4f6;
}

.light .note {
    background: #e5e7eb;
}
#lanyard-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
}
</style>

</head>

<body>
<div id="lanyard-container"></div>
<div class="container">

<div class="top">

<h2>🔐 Secure Notes</h2>

<button onclick="toggleTheme()">Toggle Theme</button>
<a href="/logout">
<button>Logout</button>
</a>

</div>

<div class="card">

<form method="POST">

<input
name="note"
placeholder="Enter secure note"
required>

<button>Add</button>

</form>

<br>

<form method="GET">

<input
name="search"
placeholder="Search notes"
value="{{ search }}">

<button>Search</button>

</form>

<h3>Saved Notes</h3>

{% for i, note in notes %}

<div class="note">

{{ note }}

<form method="POST"
style="display:inline;">

<button
name="delete"
value="{{ i }}">

Delete

</button>

</form>

</div>

{% endfor %}

</div>

</div>
<script>

function toggleTheme() {
    document.body.classList.toggle("light");

    if (document.body.classList.contains("light")) {
        localStorage.setItem("theme", "light");
    } else {
        localStorage.setItem("theme", "dark");
    }
}

window.onload = function() {
    if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light");
    }
}

</script>
<script type="module">

import Lanyard from "./components/Lanyard.jsx"

const container = document.getElementById("lanyard-container")

new Lanyard({
    position: [0, 0, 20],
    gravity: [0, -40, 0]
})

</script>
</body>
</html>
